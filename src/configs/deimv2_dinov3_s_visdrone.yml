# DEIMv2-DINOv3-S VisDrone MOT fine-tuning — 100% DEIMv2 YAML-config pipeline
#
# Entry point: python src/train_mot.py -c src/configs/deimv2_dinov3_s_visdrone.yml \
#                                       -t models/deimv2_dinov3_s_coco.pth

task: mot   # → MotSolver

model: DEIM
criterion: DEIMMotCriterion
postprocessor: PostProcessor

use_focal_loss: True
eval_spatial_size: [640, 640]

# ── Model ────────────────────────────────────────────────────────────────────
DEIM:
  backbone: DINOv3STAs
  encoder: HybridEncoder
  decoder: DEIMTransformer

DINOv3STAs:
  name: vit_tiny
  embed_dim: 192
  weights_path: ''
  interaction_indexes: [3, 7, 11]
  num_heads: 3

HybridEncoder:
  in_channels: [192, 192, 192]
  feat_strides: [8, 16, 32]
  hidden_dim: 192
  dim_feedforward: 512
  depth_mult: 0.67
  expansion: 0.34
  use_encoder_idx: [2]
  num_encoder_layers: 1
  nhead: 6
  dropout: 0.
  enc_act: gelu
  version: deim
  csp_type: csp2
  fuse_op: sum
  act: silu

DEIMTransformer:
  feat_channels: [192, 192, 192]
  feat_strides: [8, 16, 32]
  hidden_dim: 192
  num_levels: 3
  num_queries: 500
  num_layers: 4
  eval_idx: -1
  num_classes: 10

  num_denoising: 100
  label_noise_ratio: 0.5
  box_noise_scale: 1.0

  reg_max: 32
  reg_scale: 4
  layer_scale: 1
  num_points: [3, 6, 3]
  cross_attn_method: default
  query_select_method: default
  activation: silu
  mlp_act: silu
  dim_feedforward: 512

  reid_dim: 128

PostProcessor:
  num_top_queries: 500

# ── Criterion ────────────────────────────────────────────────────────────────
DEIMMotCriterion:
  num_classes: 10
  weight_dict:
    loss_mal: 1
    loss_bbox: 5
    loss_giou: 2
    loss_fgl: 0.15
    loss_ddf: 1.5
  losses: ['mal', 'boxes', 'local']
  gamma: 1.5
  alpha: 0.75
  reg_max: 32
  id_weight: 1.0
  reid_dim: 128
  use_triplet: True

  matcher:
    type: HungarianMatcher
    weight_dict: {cost_class: 2, cost_bbox: 5, cost_giou: 2}
    alpha: 0.25
    gamma: 2.0
    change_matcher: True
    iou_order_alpha: 4.0
    matcher_change_epoch: 20

# ── Dataset & DataLoader ──────────────────────────────────────────────────────
# DEIMv2's create() requires:
#   train_dataloader.type = DataLoader   → registered DataLoader class
#   dataset.type          = VisDroneDataset
#   transforms.type       = Compose      → registered transform container
#   collate_fn.type       = BatchImageCollateFunction

train_dataloader:
  type: DataLoader                         # ← required by DEIMv2 create() system

  dataset:
    type: VisDroneDataset
    data_cfg: src/lib/cfg/visdrone.json
    split: train
    num_classes: 10
    with_reid: True
    transforms:
      type: Compose
      ops:
        - {type: Mosaic, output_size: 320, rotation_range: 10,
           translation_range: [0.1, 0.1], scaling_range: [0.5, 1.5],
           probability: 1.0, fill_value: 0, use_cache: True,
           max_cached_images: 50, random_pop: True}
        - {type: RandomPhotometricDistort, p: 0.5}
        - {type: RandomZoomOut, fill: 0}
        - {type: RandomIoUCrop, p: 0.8}
        - {type: SanitizeBoundingBoxes, min_size: 1}
        - {type: RandomHorizontalFlip}
        - {type: Resize, size: [640, 640]}
        - {type: SanitizeBoundingBoxes, min_size: 1}
        - {type: ConvertPILImage, dtype: 'float32', scale: True}
        - {type: Normalize, mean: [0.485, 0.456, 0.406], std: [0.229, 0.224, 0.225]}
        - {type: ConvertBoxes, fmt: 'cxcywh', normalize: True}
      policy:
        name: stop_epoch
        epoch: 120
        ops: ['Mosaic', 'RandomPhotometricDistort', 'RandomZoomOut', 'RandomIoUCrop']

  collate_fn:
    type: BatchImageCollateFunction
    base_size: 640
    base_size_repeat: 20
    stop_epoch: 120
    ema_restart_decay: 0.9999
    mixup_prob: 0.0          # disabled — VisDrone targets don't have 'area'
    copyblend_prob: 0.0      # disabled for same reason

  total_batch_size: 16
  num_workers: 4
  drop_last: True
  shuffle: True

# val_dataloader is optional — only add when you have a val split in visdrone.json.
# Without it, MotSolver skips COCO eval and saves best.pth by training loss.
# Example (add when val split exists):
#
# val_dataloader:
#   type: DataLoader
#   dataset:
#     type: VisDroneDataset
#     data_cfg: src/lib/cfg/visdrone.json
#     split: val
#     num_classes: 10
#     with_reid: False
#     transforms:
#       type: Compose
#       ops:
#         - {type: Resize, size: [640, 640]}
#         - {type: ConvertPILImage, dtype: 'float32', scale: True}
#         - {type: Normalize, mean: [0.485, 0.456, 0.406], std: [0.229, 0.224, 0.225]}
#   collate_fn:
#     type: batch_image_collate_fn
#   total_batch_size: 8
#   num_workers: 4
#   drop_last: False
#   shuffle: False

# ── Optimizer ─────────────────────────────────────────────────────────────────
optimizer:
  type: AdamW
  params:
    -
      params: '^(?=.*deim\.backbone)(?!.*(?:norm|bn|bias)).*$'
      lr: 0.000025
    -
      params: '^(?=.*deim\.backbone)(?=.*(?:norm|bn|bias)).*$'
      lr: 0.000025
      weight_decay: 0.
    -
      params: '^(?=.*(?:encoder|decoder))(?=.*(?:norm|bn|bias)).*$'
      weight_decay: 0.

  lr: 0.0005
  betas: [0.9, 0.999]
  weight_decay: 0.0001

# ── LR Scheduler (FlatCosine from DEIMv2) ─────────────────────────────────────
epoches: 40
lrsheduler: flatcosine
lr_gamma: 0.5
warmup_iter: 500
flat_epoch: 20
no_aug_epoch: 5

# ── Runtime ───────────────────────────────────────────────────────────────────
grad_accum: 4

use_amp: True
use_ema: True
ema:
  type: ModelEMA
  decay: 0.9999
  warmups: 2000

clip_max_norm: 0.1
checkpoint_freq: 5
print_freq: 10
output_dir: ./outputs/deimv2_dinov3_s_visdrone
